<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment – CourseFlow</title>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/app.js"></script>
</head>
<body id="submit-assignment-page">
<div class="gc-app">
    <div class="gc-overlay" id="gc-overlay"></div>
    <div class="gc-main">
        <header class="gc-topbar">
            <button class="gc-hamburger" id="gc-toggle-mobile" aria-label="Open navigation">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <div class="gc-topbar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><defs><linearGradient id="submit-brand" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#b45f44"/><stop offset="100%" stop-color="#2c6b5b"/></linearGradient></defs><rect width="24" height="24" rx="7" fill="url(#submit-brand)"/><path d="M6 8.5c0-1.1.9-2 2-2h8.6c.53 0 1.04.21 1.41.59l1.4 1.41V17a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V8.5Z" fill="rgba(255,255,255,.92)"/><path d="M17 9h-2.25a1.75 1.75 0 0 1-1.75-1.75V5.5" fill="none" stroke="#b45f44" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 12h6M9 15h4" fill="none" stroke="#2d3a3a" stroke-width="1.4" stroke-linecap="round"/></svg>
                CourseFlow
            </div>
            <div class="gc-topbar-spacer"></div>
            <div class="gc-user-chip">
                <span class="gc-user-name" data-user-name></span>
                <div class="gc-user-avatar" id="gc-user-avatar"></div>
            </div>
        </header>
        <main class="gc-content">
            <div class="gc-page-header">
                <div>
                    <h1>Turn In Work</h1>
                    <p>Open this page from a specific assignment, then upload your file.</p>
                </div>
            </div>

            <section class="dashboard-grid">
                <article class="form-card span-5">
                    <h2 class="card-title">Submission Form</h2>
                    <form id="submission-form" class="form-grid">
                        <div class="field">
                            <label for="assignmentId">Assignment (selected)</label>
                            <select id="assignmentId" required></select>
                        </div>
                        <div class="field">
                            <label for="file">Upload file</label>
                            <input id="file" type="file" accept=".pdf,.doc,.docx" required>
                        </div>
                        <div class="button-row">
                            <button class="btn btn-primary" type="submit">Submit Assignment</button>
                        </div>
                        <div id="submission-status"></div>
                    </form>
                    <div class="mt-24" id="selected-assignment-detail"></div>
                </article>

                <article class="panel span-7">
                    <div class="section-header">
                        <h2>Available Assignments</h2>
                        <p>Confirm the expected work before uploading.</p>
                    </div>
                    <div id="assignment-feed" class="stream-list"></div>
                </article>
            </section>

            <section class="table-card mt-24">
                <div class="section-header">
                    <h2>Your Submission Log</h2>
                    <p>Track submitted files and grading updates.</p>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th>Assignment</th><th>File</th><th>Submitted</th>
                            <th>Marks</th><th>Feedback</th><th>Status</th><th>Action</th>
                        </tr></thead>
                        <tbody id="my-submissions-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
